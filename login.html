<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCare Clinic — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --blue:#2563eb; --blue-dark:#1d4ed8; --red:#ef4444; --white:#ffffff; }
    body { font-family:'Inter',system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#060a14; overflow:hidden; position:relative; }

    /* ── AURORA MEDICAL BACKGROUND ── */
    #aurora-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
    }
    .aurora-glow {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(34,211,238,0.18), transparent 60%),
        radial-gradient(ellipse 70% 60% at 85% 15%, rgba(59,130,246,0.16), transparent 60%),
        radial-gradient(ellipse 60% 50% at 50% 100%, rgba(99,102,241,0.14), transparent 65%);
      mix-blend-mode: screen;
      animation: auroraShift 14s ease-in-out infinite alternate;
    }
    @keyframes auroraShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      50%  { filter: hue-rotate(12deg) brightness(1.12); }
      100% { filter: hue-rotate(-8deg) brightness(0.95); }
    }
    .grid-overlay {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 50% 40%, rgba(0,0,0,0.9), transparent 75%);
    }
    .vignette {
      position: fixed; inset:0; z-index:2; pointer-events:none;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(6,10,20,0.65) 100%);
    }
    .wrapper { position:relative; z-index:10; width:100%; max-width:440px; padding:20px; }
    .logo { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:32px; }
    .logo-icon { width:44px; height:44px; background:linear-gradient(135deg,#2563eb,#06b6d4); border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 24px rgba(37,99,235,0.5); }
    .logo-icon svg { width:22px; height:22px; }
    .logo-text { font-size:24px; font-weight:700; color:#fff; letter-spacing:-0.5px; }
    .logo-text span { background:linear-gradient(90deg,#60a5fa,#22d3ee); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .card { background:rgba(255,255,255,0.045); backdrop-filter:blur(28px) saturate(140%); -webkit-backdrop-filter:blur(28px) saturate(140%); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:36px 32px 32px; box-shadow:0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); transition: transform 0.15s ease-out; will-change: transform; max-height: 88vh; overflow-y: auto; }
    .card::-webkit-scrollbar { width: 6px; }
    .card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    .wrapper { max-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
    .card-title { font-size:22px; font-weight:700; color:#fff; margin-bottom:6px; letter-spacing:-0.3px; }
    .card-sub { font-size:13.5px; color:rgba(255,255,255,0.45); margin-bottom:28px; font-weight:400; }
    .tabs { display:flex; background:rgba(255,255,255,0.06); border-radius:10px; padding:4px; margin-bottom:24px; gap:4px; }
    .tab { flex:1; padding:8px; border:none; background:none; color:rgba(255,255,255,0.45); font-size:13.5px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; border-radius:7px; transition:all 0.2s; }
    .tab.active { background:rgba(255,255,255,0.12); color:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:12px; font-weight:600; color:rgba(255,255,255,0.55); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:7px; }
    .input-wrap { position:relative; }
    .input-wrap svg { position:absolute; left:13px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:rgba(255,255,255,0.3); pointer-events:none; }
    .form-group input { width:100%; padding:11px 14px 11px 40px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:10px; font-size:14px; color:#fff; font-family:'Inter',sans-serif; outline:none; transition:all 0.2s; }
    .form-group input::placeholder { color:rgba(255,255,255,0.25); }
    .form-group input:focus { background:rgba(255,255,255,0.1); border-color:rgba(96,165,250,0.6); box-shadow:0 0 0 3px rgba(37,99,235,0.2); }
    .error-msg { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; font-size:13px; padding:10px 14px; border-radius:10px; margin-bottom:16px; display:none; font-weight:500; }
    .error-msg.show { display:block; }
    .success-msg { background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.3); color:#86efac; font-size:13px; padding:10px 14px; border-radius:10px; margin-bottom:16px; display:none; font-weight:500; }
    .success-msg.show { display:block; }
    .btn { width:100%; padding:12px; border:none; border-radius:10px; font-size:14px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; transition:all 0.2s; background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff; box-shadow:0 4px 16px rgba(37,99,235,0.4); position:relative; overflow:hidden; }
    .btn:hover { box-shadow:0 6px 24px rgba(37,99,235,0.55); transform:translateY(-1px); }
    .btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; box-shadow:none; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite; margin-right:8px; vertical-align:middle; }
    @keyframes spin { to{transform:rotate(360deg);} }
    .footer { text-align:center; margin-top:24px; font-size:12px; color:rgba(255,255,255,0.25); }
    .role-note { text-align:center; font-size:11.5px; color:rgba(255,255,255,0.3); margin-top:16px; line-height:1.5; }
  </style>
</head>
<body>
  <canvas id="aurora-canvas"></canvas>
  <div class="aurora-glow"></div>
  <div class="grid-overlay"></div>
  <div class="vignette"></div>
  <div class="wrapper">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M12 4v16M4 12h16"/></svg></div>
      <div class="logo-text">Medi<span>Care</span></div>
    </div>
    <div class="card">
      <h1 class="card-title" id="card-title">Welcome back</h1>
      <p class="card-sub" id="card-sub">Sign in to access your account</p>
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">Patient Sign Up</button>
        <button class="tab" id="tab-doctor" onclick="switchTab('doctor')">Doctor Sign Up</button>
      </div>
      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
      </div>
      <div class="form-group" id="doctor-fields" style="display:none;">
        <label>Full Name (e.g. Dr. Jane Odhiambo)</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="doctor-name" placeholder="Dr. Jane Odhiambo" />
        </div>
      </div>
      <div class="form-group" id="doctor-spec-field" style="display:none;">
        <label>Specialization</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/></svg>
          <input type="text" id="doctor-spec" placeholder="e.g. Pediatrics, Cardiology" />
        </div>
      </div>
      <button class="btn" id="submit-btn" onclick="handleSubmit()">Sign In</button>
      <p class="role-note">Patients can create an account here to book appointments.<br>Clinic staff sign in with their existing admin account.</p>
    </div>
    <p class="footer">MediCare Clinic &mdash; Patient Management System</p>
  </div>
  <script>
    const SUPABASE_URL = 'https://dwsfwzleiybjunoqcudh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3c2Z3emxlaXlianVub3FjdWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODA4MzYsImV4cCI6MjA5NDk1NjgzNn0.937zxZij7-vQYK4GyoKn1VOfRxPSo-VAh1-aOyOjHF0';
    const { createClient } = supabase;
    const auth = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let mode = 'login';

    async function redirectByRole(userId) {
      const { data: profile } = await auth.from('profiles').select('role').eq('id', userId).single();
      const role = profile?.role || 'user';
      if (role === 'user') window.location.href = 'portal.html';
      else if (role === 'doctor') window.location.href = 'doctor-portal.html';
      else if (role === 'doctor_pending') window.location.href = 'doctor-pending.html';
      else window.location.href = 'index.html';
    }

    auth.auth.getSession().then(({ data: { session } }) => {
      if (session) redirectByRole(session.user.id);
    });

    function switchTab(tab) {
      mode = tab;
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('tab-doctor').classList.toggle('active', tab === 'doctor');
      document.getElementById('doctor-fields').style.display = tab === 'doctor' ? 'block' : 'none';
      document.getElementById('doctor-spec-field').style.display = tab === 'doctor' ? 'block' : 'none';
      const titles = { login: 'Welcome back', signup: 'Create account', doctor: 'Doctor registration' };
      const subs = {
        login: 'Sign in to access your account',
        signup: 'Register as a patient to book appointments',
        doctor: 'Submit your details for admin approval'
      };
      document.getElementById('card-title').textContent = titles[tab];
      document.getElementById('card-sub').textContent = subs[tab];
      document.getElementById('submit-btn').textContent = tab === 'login' ? 'Sign In' : (tab === 'doctor' ? 'Submit for Approval' : 'Create Account');
      clearFeedback();
    }
    function showError(msg) { document.getElementById('error-msg').textContent = msg; document.getElementById('error-msg').classList.add('show'); document.getElementById('success-msg').classList.remove('show'); }
    function showSuccess(msg) { document.getElementById('success-msg').textContent = msg; document.getElementById('success-msg').classList.add('show'); document.getElementById('error-msg').classList.remove('show'); }
    function clearFeedback() { document.getElementById('error-msg').classList.remove('show'); document.getElementById('success-msg').classList.remove('show'); }
    function setLoading(on) {
      const btn = document.getElementById('submit-btn');
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spinner"></span>Please wait...' : (mode === 'login' ? 'Sign In' : 'Create Account');
    }

    async function handleSubmit() {
      clearFeedback();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Please enter your email and password.'); return; }
      if ((mode === 'signup' || mode === 'doctor') && password.length < 6) { showError('Password must be at least 6 characters.'); return; }

      if (mode === 'doctor') {
        const docName = document.getElementById('doctor-name').value.trim();
        if (!docName) { showError('Please enter your full name.'); return; }
      }

      setLoading(true);

      if (mode === 'login') {
        const { data, error } = await auth.auth.signInWithPassword({ email, password });
        if (error) {
          showError(error.message === 'Invalid login credentials' ? 'Incorrect email or password. Please try again.' : error.message);
          setLoading(false);
        } else {
          redirectByRole(data.user.id);
        }
      } else if (mode === 'signup') {
        const { data, error } = await auth.auth.signUp({ email, password });
        if (error) {
          showError(error.message);
          setLoading(false);
        } else {
          if (data.user) {
            await auth.from('profiles').insert([{ id: data.user.id, email, role: 'user' }]);
          }
          showSuccess('Account created! You can now sign in.');
          setLoading(false);
        }
      } else if (mode === 'doctor') {
        const docName = document.getElementById('doctor-name').value.trim();
        const docSpec = document.getElementById('doctor-spec').value.trim();
        const { data, error } = await auth.auth.signUp({ email, password });
        if (error) {
          showError(error.message);
          setLoading(false);
        } else {
          if (data.user) {
            await auth.from('profiles').insert([{ id: data.user.id, email, role: 'doctor_pending' }]);
            await auth.from('doctors').insert([{
              full_name: docName,
              specialization: docSpec || null,
              email,
              available: false,
              approved: false,
              auth_user_id: data.user.id
            }]);
          }
          showSuccess('Registration submitted! An administrator will review and approve your account.');
          setLoading(false);
        }
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
  </script>

  <script>
    // ═══════════════════════════════════════════════════════════════════
    // AURORA MEDICAL BACKGROUND — particles, neural lines, DNA wave, ripples
    // ═══════════════════════════════════════════════════════════════════
    (function () {
      const canvas = document.getElementById('aurora-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, dpr;
      let mouseX = -9999, mouseY = -9999;
      let targetMouseX = -9999, targetMouseY = -9999;
      const ripples = [];

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = canvas.width = window.innerWidth * dpr;
        H = canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      window.addEventListener('resize', resize);

      const cw = () => window.innerWidth;
      const ch = () => window.innerHeight;

      // ── Particles (slow-floating nodes) ──
      const PARTICLE_COUNT = window.innerWidth < 700 ? 36 : 70;
      const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
        x: Math.random() * cw(),
        y: Math.random() * ch(),
        r: Math.random() * 1.6 + 0.6,
        vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18,
        hue: Math.random() < 0.5 ? 'cyan' : 'blue',
        pulse: Math.random() * Math.PI * 2,
      }));

      // ── DNA wave strands ──
      const DNA_POINTS = 60;
      let dnaPhase = 0;

      window.addEventListener('mousemove', e => {
        targetMouseX = e.clientX;
        targetMouseY = e.clientY;
      });
      window.addEventListener('mouseleave', () => {
        targetMouseX = -9999; targetMouseY = -9999;
      });
      window.addEventListener('click', e => {
        ripples.push({ x: e.clientX, y: e.clientY, r: 0, alpha: 0.5 });
      });
      // Subtle parallax on the card
      const card = document.querySelector('.card');
      window.addEventListener('mousemove', e => {
        if (!card) return;
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        const dx = (e.clientX - cx) / cx;
        const dy = (e.clientY - cy) / cy;
        card.style.transform = `translate(${dx * 4}px, ${dy * 3}px)`;
      });

      function drawParticles(t) {
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < -10) p.x = cw() + 10;
          if (p.x > cw() + 10) p.x = -10;
          if (p.y < -10) p.y = ch() + 10;
          if (p.y > ch() + 10) p.y = -10;

          // cursor attraction (very gentle)
          if (mouseX > -1000) {
            const dx = mouseX - p.x, dy = mouseY - p.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 140) {
              p.x -= dx * 0.0018;
              p.y -= dy * 0.0018;
            }
          }

          const glow = 0.5 + 0.5 * Math.sin(t * 0.0012 + p.pulse);
          const color = p.hue === 'cyan' ? `rgba(103,232,249,${0.35 + glow * 0.4})` : `rgba(96,165,250,${0.3 + glow * 0.35})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r + glow * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.shadowColor = color;
          ctx.shadowBlur = 6;
          ctx.fill();
        }
        ctx.shadowBlur = 0;
      }

      function drawNeuralLines() {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const a = particles[i], b = particles[j];
            const dx = a.x - b.x, dy = a.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              const alpha = (1 - dist / 120) * 0.18;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.strokeStyle = `rgba(125,211,252,${alpha})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
      }

      function drawDNAWave(t) {
        dnaPhase += 0.0035;
        const baseY = ch() * 0.78;
        const amp = 26;
        const spacing = cw() / DNA_POINTS;

        for (let strand = 0; strand < 2; strand++) {
          ctx.beginPath();
          for (let i = 0; i <= DNA_POINTS; i++) {
            const x = i * spacing;
            const phase = dnaPhase + (strand * Math.PI);
            const y = baseY + Math.sin(i * 0.35 + phase) * amp;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.strokeStyle = strand === 0 ? 'rgba(34,211,238,0.16)' : 'rgba(99,102,241,0.14)';
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }

        // connecting "rungs" between the two strands
        for (let i = 0; i <= DNA_POINTS; i += 4) {
          const x = i * spacing;
          const y1 = baseY + Math.sin(i * 0.35 + dnaPhase) * amp;
          const y2 = baseY + Math.sin(i * 0.35 + dnaPhase + Math.PI) * amp;
          ctx.beginPath();
          ctx.moveTo(x, y1);
          ctx.lineTo(x, y2);
          ctx.strokeStyle = 'rgba(148,163,253,0.07)';
          ctx.lineWidth = 0.7;
          ctx.stroke();
        }
      }

      function drawRipples() {
        for (let i = ripples.length - 1; i >= 0; i--) {
          const rp = ripples[i];
          rp.r += 2.4;
          rp.alpha -= 0.012;
          if (rp.alpha <= 0) { ripples.splice(i, 1); continue; }
          ctx.beginPath();
          ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(125,211,252,${rp.alpha})`;
          ctx.lineWidth = 1.4;
          ctx.stroke();
        }
      }

      function loop(t) {
        ctx.clearRect(0, 0, cw(), ch());

        // smooth cursor follow (for particle attraction)
        mouseX += (targetMouseX - mouseX) * 0.08;
        mouseY += (targetMouseY - mouseY) * 0.08;

        drawDNAWave(t);
        drawNeuralLines();
        drawParticles(t);
        drawRipples();

        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
